<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>For You ❤️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--cream:#f7f1e8;--fade:2600ms}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;background:#000;overflow:hidden;font-family:"Cormorant Garamond",Georgia,serif;color:var(--cream)}
#app{position:fixed;inset:0;background:#000}
.layer,.bg{position:absolute;inset:0;opacity:0;transition:opacity var(--fade) ease-in-out}
.bg{background-position:center;background-size:cover;filter:blur(34px);transform:scale(1.14)}
.bg:after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.47)}
.layer{background-position:center;background-size:contain;background-repeat:no-repeat;filter:drop-shadow(0 18px 45px rgba(0,0,0,.55))}
.active{opacity:1}
.zoom-a{animation:zoomA 21000ms ease-in-out forwards}.zoom-b{animation:zoomB 21000ms ease-in-out forwards}.zoom-c{animation:zoomC 21000ms ease-in-out forwards}
@keyframes zoomA{from{transform:scale(1.01)}to{transform:scale(1.075)}}@keyframes zoomB{from{transform:scale(1.075) translateX(-.6%)}to{transform:scale(1.015) translateX(.6%)}}@keyframes zoomC{from{transform:scale(1.025) translateY(.5%)}to{transform:scale(1.085) translateY(-.5%)}}
.vignette{position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at center,transparent 42%,rgba(0,0,0,.38) 100%),linear-gradient(to bottom,rgba(0,0,0,.28),transparent 22%,transparent 75%,rgba(0,0,0,.34))}
#intro{position:absolute;inset:0;z-index:6;display:flex;align-items:center;justify-content:center;padding:min(9vw,70px);background:#000;transition:opacity 3000ms ease}
#introText{max-width:980px;text-align:center;font-size:clamp(2rem,5.1vw,4.8rem);font-weight:500;line-height:1.18;letter-spacing:.01em;text-shadow:0 12px 35px rgba(0,0,0,.9);white-space:pre-wrap}
.cursor{display:inline-block;margin-left:.08em;animation:blink 950ms steps(2,start) infinite}@keyframes blink{50%{opacity:0}}
#endingText{position:absolute;z-index:8;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:30px;font-size:clamp(2.4rem,6vw,5.6rem);font-weight:500;line-height:1.12;text-shadow:0 14px 45px rgba(0,0,0,.95);opacity:0;transition:opacity 4200ms ease}
#dim{position:absolute;z-index:7;inset:0;background:rgba(0,0,0,.34);opacity:0;transition:opacity 4200ms ease}
#black{position:absolute;z-index:9;inset:0;background:#000;opacity:0;pointer-events:none;transition:opacity 3000ms ease}
#start{position:fixed;z-index:20;inset:0;display:none;align-items:center;justify-content:center;padding:24px;background:rgba(0,0,0,.9)}
#startCard{text-align:center}
button{font-family:inherit}
#start button,#audioHint{border:1px solid rgba(247,241,232,.75);color:var(--cream);background:rgba(255,255,255,.06);border-radius:999px;cursor:pointer}
#start button{font-size:1.65rem;padding:14px 34px}
#start p{margin:18px 0 0;font-size:1.1rem;color:rgba(247,241,232,.75)}
#audioHint{position:fixed;left:50%;bottom:max(22px,env(safe-area-inset-bottom));transform:translateX(-50%);z-index:10;display:none;backdrop-filter:blur(10px);font-size:1.1rem;padding:10px 20px}
@media(max-width:700px){#introText{font-size:clamp(2rem,9vw,3.4rem)}#endingText{font-size:clamp(2.2rem,10vw,4.2rem)}.bg{filter:blur(28px);transform:scale(1.18)}}
</style>
</head>
<body>
<div id="app">
  <div id="bgA" class="bg"></div><div id="bgB" class="bg"></div>
  <div id="slideA" class="layer"></div><div id="slideB" class="layer"></div>
  <div class="vignette"></div>
  <div id="dim"></div>
  <div id="endingText"></div>
  <section id="intro"><div id="introText"></div></section>
  <div id="black"></div>
  <div id="start"><div id="startCard"><button id="startBtn">▶ Rozpocznij</button><p>Dotknij, aby włączyć muzykę i pokaz.</p></div></div>
  <button id="audioHint">▶ Włącz muzykę</button>
  <audio id="audio" preload="auto"></audio>
</div>
<script src="config.js"></script>
<script>
const cfg=window.SLIDESHOW_CONFIG;
document.documentElement.style.setProperty("--fade", cfg.fadeDuration+"ms");
const audio=document.getElementById("audio"); audio.src=cfg.audioFile;
const intro=document.getElementById("intro"), introText=document.getElementById("introText");
const endingText=document.getElementById("endingText"), dim=document.getElementById("dim"), black=document.getElementById("black");
const start=document.getElementById("start"), startBtn=document.getElementById("startBtn"), audioHint=document.getElementById("audioHint");
const slides=[document.getElementById("slideA"),document.getElementById("slideB")], bgs=[document.getElementById("bgA"),document.getElementById("bgB")];
let using=0, started=false, wakeLock=null;
const motions=["zoom-a","zoom-b","zoom-c"];
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
async function keepAwake(){try{if("wakeLock" in navigator) wakeLock=await navigator.wakeLock.request("screen")}catch(e){}}
async function typeLine(text,speed){introText.innerHTML='<span class="cursor">|</span>';for(let i=1;i<=text.length;i++){introText.innerHTML=text.slice(0,i)+'<span class="cursor">|</span>';await sleep(speed)}}
async function runIntro(){intro.style.display="flex";intro.style.opacity=1;await sleep(cfg.intro.delayBeforeTyping);await typeLine(cfg.intro.firstText,cfg.intro.typingSpeed);await sleep(cfg.intro.holdFirstText);intro.style.opacity=0;await sleep(cfg.intro.fadeOut);intro.style.display="none"}
function setImage(el,name){el.style.backgroundImage=`url("${name}")`}
function showPhoto(i){const name=cfg.photos[i%cfg.photos.length], next=using?0:1, old=using;const s=slides[next], b=bgs[next];s.className="layer";void s.offsetWidth;setImage(s,name);setImage(b,name);s.classList.add(motions[i%motions.length]);bgs[old].classList.remove("active");slides[old].classList.remove("active");b.classList.add("active");s.classList.add("active");using=next}
function clearEnding(){endingText.style.opacity=0;dim.style.opacity=0;black.style.opacity=0}
async function runSlides(){clearEnding();for(let i=0;i<cfg.photos.length;i++){showPhoto(i);if(i===cfg.photos.length-1){setTimeout(()=>{endingText.textContent=cfg.ending.text;dim.style.opacity=1;endingText.style.opacity=1},cfg.ending.showOnLastPhotoAfter)}await sleep(cfg.durations[i%cfg.durations.length])}black.style.opacity=1;await sleep(cfg.ending.holdBlackBeforeRestart);restart()}
async function restart(){started=false;audio.pause();audio.currentTime=0;slides.forEach(s=>s.classList.remove("active"));bgs.forEach(b=>b.classList.remove("active"));intro.style.display="flex";intro.style.opacity=1;introText.innerHTML="";clearEnding();begin()}
async function begin(){if(started)return;started=true;start.style.display="none";await keepAwake();audio.currentTime=0;try{await audio.play()}catch(e){audioHint.style.display="block"}try{await document.documentElement.requestFullscreen()}catch(e){}await runIntro();runSlides()}
audioHint.onclick=async()=>{await audio.play();audioHint.style.display="none"};
startBtn.onclick=begin;
window.addEventListener("load",async()=>{try{await audio.play();begin()}catch(e){start.style.display="flex"}});
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible") keepAwake()});
</script>
</body>
</html>
