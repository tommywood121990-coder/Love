<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>For You ❤️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --fade: 2200ms;
  --cream: #f7f1e8;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
  font-family: "Cormorant Garamond", Georgia, serif;
  color: var(--cream);
}
#app {
  position: fixed;
  inset: 0;
  background: #000;
}
.layer, .bg {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity var(--fade) ease-in-out;
}
.bg {
  background-position: center;
  background-size: cover;
  filter: blur(34px);
  transform: scale(1.12);
  opacity: 0;
}
.bg::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.44);
}
.layer {
  background-position: center;
  background-size: contain;
  background-repeat: no-repeat;
  filter: drop-shadow(0 18px 45px rgba(0,0,0,.55));
}
.layer.active, .bg.active { opacity: 1; }
.layer.zoom-a { animation: zoomA 9800ms ease-in-out forwards; }
.layer.zoom-b { animation: zoomB 9800ms ease-in-out forwards; }
.layer.zoom-c { animation: zoomC 9800ms ease-in-out forwards; }
@keyframes zoomA { from { transform: scale(1.01); } to { transform: scale(1.075); } }
@keyframes zoomB { from { transform: scale(1.075) translateX(-.6%); } to { transform: scale(1.015) translateX(.6%); } }
@keyframes zoomC { from { transform: scale(1.025) translateY(.5%); } to { transform: scale(1.085) translateY(-.5%); } }
.vignette {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at center, transparent 42%, rgba(0,0,0,.38) 100%),
    linear-gradient(to bottom, rgba(0,0,0,.28), transparent 22%, transparent 75%, rgba(0,0,0,.34));
}
#intro {
  position: absolute;
  inset: 0;
  z-index: 5;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: min(9vw, 70px);
  background: #000;
  transition: opacity 2600ms ease;
}
#introText {
  max-width: 980px;
  text-align: center;
  font-size: clamp(2rem, 5.1vw, 4.8rem);
  font-weight: 500;
  line-height: 1.18;
  letter-spacing: .01em;
  text-shadow: 0 12px 35px rgba(0,0,0,.9);
  white-space: pre-wrap;
}
.cursor {
  display: inline-block;
  margin-left: .08em;
  animation: blink 950ms steps(2, start) infinite;
}
@keyframes blink { 50% { opacity: 0; } }
#start {
  position: fixed;
  z-index: 20;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: rgba(0,0,0,.88);
}
#startCard {
  text-align: center;
}
#start button {
  border: 1px solid rgba(247,241,232,.78);
  color: var(--cream);
  background: rgba(255,255,255,.06);
  font-family: inherit;
  font-size: 1.65rem;
  border-radius: 999px;
  padding: 14px 34px;
  cursor: pointer;
}
#start p {
  margin: 18px 0 0;
  font-size: 1.1rem;
  color: rgba(247,241,232,.75);
}
#audioHint {
  position: fixed;
  left: 50%;
  bottom: max(22px, env(safe-area-inset-bottom));
  transform: translateX(-50%);
  z-index: 10;
  display: none;
  border: 1px solid rgba(247,241,232,.55);
  color: var(--cream);
  background: rgba(0,0,0,.38);
  backdrop-filter: blur(10px);
  font-family: inherit;
  font-size: 1.1rem;
  border-radius: 999px;
  padding: 10px 20px;
}
@media (max-width: 700px) {
  #introText { font-size: clamp(2rem, 9vw, 3.4rem); }
  .bg { filter: blur(28px); transform: scale(1.18); }
}
</style>
</head>
<body>
<div id="app">
  <div id="bgA" class="bg"></div>
  <div id="bgB" class="bg"></div>
  <div id="slideA" class="layer"></div>
  <div id="slideB" class="layer"></div>
  <div class="vignette"></div>

  <section id="intro"><div id="introText"></div></section>

  <div id="start">
    <div id="startCard">
      <button id="startBtn">▶ Rozpocznij</button>
      <p>Dotknij, aby włączyć muzykę i pokaz.</p>
    </div>
  </div>

  <button id="audioHint">▶ Włącz muzykę</button>
  <audio id="audio" src="assets/yellow.mp3" preload="auto" loop></audio>
</div>

<script>
const photos = ["photo_01.jpg", "photo_02.jpg", "photo_03.jpg", "photo_04.jpg", "photo_05.jpg", "photo_06.jpg", "photo_07.jpg", "photo_08.jpg", "photo_09.jpg", "photo_10.jpeg", "photo_11.jpg", "photo_12.jpg", "photo_13.jpg"];
const audio = document.getElementById("audio");
const intro = document.getElementById("intro");
const introText = document.getElementById("introText");
const start = document.getElementById("start");
const startBtn = document.getElementById("startBtn");
const audioHint = document.getElementById("audioHint");

const slideEls = [document.getElementById("slideA"), document.getElementById("slideB")];
const bgEls = [document.getElementById("bgA"), document.getElementById("bgB")];

let current = 0;
let using = 0;
let started = false;
const slideDurations = [8800, 7600, 8200, 7800, 8600, 7400, 8300, 7900, 9000, 8200, 7700, 8500, 9800];
const motions = ["zoom-a", "zoom-b", "zoom-c"];

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function typeLine(text, speed = 58) {
  introText.innerHTML = '<span class="cursor">|</span>';
  for (let i = 1; i <= text.length; i++) {
    introText.innerHTML = text.slice(0, i) + '<span class="cursor">|</span>';
    await sleep(speed);
  }
}

async function fadeIntroOutIn() {
  introText.style.transition = "opacity 2100ms ease";
  introText.style.opacity = "0";
  await sleep(2300);
  introText.innerHTML = "";
  introText.style.opacity = "1";
}

async function runIntro() {
  intro.style.display = "flex";
  intro.style.opacity = "1";
  await sleep(2500);
  await typeLine("You are the most beautiful woman I have ever met in my entire life.", 56);
  await sleep(7200);
  await fadeIntroOutIn();
  introText.innerHTML = "I will always love you. ❤️";
  await sleep(5600);
  intro.style.opacity = "0";
  await sleep(2600);
  intro.style.display = "none";
}

function setImage(el, name) {
  el.style.backgroundImage = `url("assets/${name}")`;
}

function showPhoto(index) {
  const name = photos[index % photos.length];
  const next = using ? 0 : 1;
  const old = using;

  const slide = slideEls[next];
  const bg = bgEls[next];

  slide.className = "layer";
  void slide.offsetWidth;
  setImage(slide, name);
  setImage(bg, name);
  slide.classList.add(motions[index % motions.length]);

  bgEls[old].classList.remove("active");
  slideEls[old].classList.remove("active");
  bg.classList.add("active");
  slide.classList.add("active");
  using = next;
}

async function runSlides() {
  current = 0;
  showPhoto(current);
  while (true) {
    await sleep(slideDurations[current % slideDurations.length]);
    current = (current + 1) % photos.length;
    showPhoto(current);
  }
}

async function begin() {
  if (started) return;
  started = true;
  start.style.display = "none";
  audio.currentTime = 0;
  audio.volume = 1;
  try {
    await audio.play();
  } catch (e) {
    audioHint.style.display = "block";
  }
  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen().catch(() => {});
  }
  await runIntro();
  runSlides();
}

audioHint.onclick = async () => {
  await audio.play();
  audioHint.style.display = "none";
};

startBtn.onclick = begin;

window.addEventListener("load", async () => {
  try {
    await audio.play();
    begin();
  } catch (e) {
    start.style.display = "flex";
  }
});
</script>
</body>
</html>
